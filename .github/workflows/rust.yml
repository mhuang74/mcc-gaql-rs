name: build rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      force_gen_build:
        description: 'Force build of mcc-gaql-gen'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      gen: ${{ steps.filter.outputs.gen }}
    steps:
    - uses: actions/checkout@v3
    - uses: dorny/paths-filter@v2
      id: filter
      with:
        filters: |
          gen:
            - 'crates/mcc-gaql-gen/**'
            - 'Cargo.lock'
            - 'Cargo.toml'

  build-core:
    name: Build Core (mcc-gaql + mcc-gaql-common)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "mcc-gaql-rs-core"
        cache-on-failure: true
    - name: Install deps
      run: sudo apt-get -y install protobuf-compiler
    - name: Build mcc-gaql-common
      run: cargo build --profile ci --verbose -p mcc-gaql-common
    - name: Build mcc-gaql
      run: cargo build --profile ci --verbose -p mcc-gaql
    - name: Run tests for core crates
      run: cargo test --profile ci --verbose -p mcc-gaql-common -p mcc-gaql -- --test-threads=1

  build-gen:
    name: Build GAQL Generator (mcc-gaql-gen)
    needs: changes
    runs-on: ubuntu-latest
    # Run on push to main, manual trigger, or when gen-related files change
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.gen == 'true'
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "mcc-gaql-rs-gen"
        cache-on-failure: true
        # Exclude ort.pyke.io cache from rust-cache - it corrupts easily
        cache-directories: |
          ~/.cargo/registry/cache
          ~/.cargo/registry/src
          ~/.cargo/git/db
          target
    - name: Clear ort cache
      run: rm -rf ~/.cache/ort.pyke.io
    - name: Install deps
      run: sudo apt-get -y install protobuf-compiler
    - name: Build mcc-gaql-gen
      run: cargo build --profile ci --verbose -p mcc-gaql-gen
    - name: Run tests for mcc-gaql-gen
      run: cargo test --profile ci --verbose -p mcc-gaql-gen -- --test-threads=1

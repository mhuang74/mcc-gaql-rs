[perf_max_campaigns_with_traffic_last_30_days]
description = """
Show daily performance of Performance Max Campaigns for the previous 30 days, including key performance metrics like CTR, AvgCpc, Conversion, Revenue, CPA. Include ID and Name for campaigns.
"""
query = """
	SELECT 
	  campaign.id, 
	  campaign.name,
  	campaign.advertising_channel_type,
	  segments.date,
	  metrics.impressions, 
	  metrics.clicks, 
	  metrics.ctr,
	  metrics.cost_micros,
	  metrics.average_cost,
	  metrics.conversions,
	  metrics.conversions_value,
	  metrics.cost_per_conversion,
	  customer.currency_code 
	FROM campaign 
	WHERE 
	  segments.date DURING LAST_30_DAYS 
	  AND campaign.advertising_channel_type IN ('PERFORMANCE_MAX')
	  AND metrics.impressions > 1 
	ORDER BY 
	  segments.date, campaign.id
"""

[asset_fields_with_traffic_ytd]
description = """
Show YTD daily performance of assets on days with at least 1 daily impression. Include account currency code and asset type.
"""
query = """
	SELECT 
	  asset_field_type_view.field_type, 
	  segments.date,
	  metrics.impressions, 
	  metrics.clicks, 
	  metrics.cost_micros,
	  customer.currency_code  
	FROM asset_field_type_view 
	WHERE 
	  segments.year IN (2026)
	  AND metrics.impressions > 1
	ORDER BY 
	  asset_field_type_view.field_type, segments.date
"""


[campaigns_with_smart_bidding_by_spend]
description = """
Show 25 top spending Smart Bidding Campaigns from each account, with at least 1,000 spend within last 7 days. Include ID and Name of accounts and campaigns. Include conversion metrics.
"""
query = """
	SELECT 
	  customer.id, 
	  customer.descriptive_name,
	  customer.currency_code,
	  campaign.id, 
	  campaign.name,
	  campaign.advertising_channel_type,
	  campaign.bidding_strategy_type,
	  campaign_budget.amount_micros,
	  metrics.average_cpc,
	  metrics.clicks, 
	  metrics.cost_micros,
	  metrics.conversions,
	  metrics.cost_per_conversion,
 	  metrics.conversions_value
	FROM campaign
	WHERE
	  campaign.bidding_strategy_type IN ('MAXIMIZE_CLICKS', 'MAXIMIZE_CONVERSIONS', 'MAXIMIZE_CONVERSION_VALUE', 'TARGET_CPA', 'TARGET_ROAS', 'TARGET_SPEND') 
	  AND campaign.status IN ('ENABLED') 
	  AND segments.date DURING LAST_7_DAYS 
	  AND metrics.cost_micros > 1000000000
	ORDER by metrics.cost_micros DESC
	LIMIT 25
"""


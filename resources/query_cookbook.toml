[account_ids_with_access_and_traffic_last_week]
description = """
Find accounts that have clicks in last 7 days
"""
query = """
SELECT 
	customer.id
FROM customer 
WHERE 
	segments.date during LAST_7_DAYS
	AND metrics.clicks > 1
"""

[accounts_with_traffic_last_week]
description = """
Show account performance for accounts with impressions in the last 7 days. Include account name, cost, and currency.
"""
query = """
SELECT 
	customer.id, 
	customer.descriptive_name, 
	metrics.impressions, 
	metrics.clicks, 
	metrics.cost_micros,
	customer.currency_code 
FROM customer 
WHERE 
	segments.date during LAST_7_DAYS
	AND metrics.impressions > 1
"""

[keywords_with_top_traffic_last_week]
description = """
Show cost and performance of top trafficking keywords with more than 10,000 clicks in the last 7 days. Include id and name for account, campaign, and adgroup. Include campaign type and account currency.
"""
query = """
SELECT
	customer.id,
	customer.descriptive_name,
	campaign.id,
	campaign.name,
	campaign.advertising_channel_type,
	ad_group.id,
	ad_group.name,
	ad_group.type,
	ad_group_criterion.criterion_id,
	ad_group_criterion.keyword.text,
	metrics.impressions,
	metrics.clicks,
	metrics.cost_micros,
	customer.currency_code 
FROM keyword_view
WHERE
	segments.date DURING LAST_7_DAYS
	and metrics.clicks > 10000
ORDER BY
	metrics.clicks DESC
LIMIT 10
"""

[accounts_with_perf_max_campaigns_last_week]
description = """
Show the top performing Performance Max Campaign (by clicks) for each account, with at least 100 clicks in the last 7 days. Include id and name for account and campaign. Include campaign type and account currency.
"""
query = """
SELECT 
  customer.id, 
  customer.descriptive_name, 
  campaign.id, 
  campaign.advertising_channel_type, 
  campaign.name, 
  metrics.impressions, 
  metrics.clicks, 
  metrics.cost_micros,
  customer.currency_code 
FROM campaign 
WHERE 
  segments.date DURING LAST_7_DAYS 
  AND campaign.advertising_channel_type IN ('PERFORMANCE_MAX') 
  AND metrics.clicks > 100
ORDER BY 
  metrics.clicks DESC 
LIMIT 1
"""


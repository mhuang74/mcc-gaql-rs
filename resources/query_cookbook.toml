[campaign_conversion_goal_settings]
description = """
Show campaign-level conversion goal settings and their configured conversion action categories and origins.
"""
query = """
SELECT
  customer.id,
  campaign.id,
  campaign.name,
  campaign_conversion_goal.campaign,
  campaign_conversion_goal.category,
  campaign_conversion_goal.origin
FROM campaign_conversion_goal
ORDER BY campaign.name
"""

[click_view_single_day]
description = """
Get click-level data for a single day (required constraint for click_view). Shows GCLID, click type, area of interest, and keyword info.
"""
query = """
SELECT
  customer.id,
  click_view.gclid,
  click_view.ad_group_ad,
  click_view.keyword,
  click_view.keyword_info.text,
  click_view.keyword_info.match_type,
  click_view.area_of_interest.city,
  click_view.area_of_interest.country,
  segments.click_type,
  segments.date
FROM click_view
WHERE segments.date = '2026-04-02'
LIMIT 100
"""

[video_campaigns_performance]
description = """
Get video campaign performance last 30 days - need video views, view rate, and video quartile metrics.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.currency_code,
  campaign.id,
  campaign.name,
  campaign.status,
  metrics.impressions,
  metrics.video_trueview_views,
  metrics.video_trueview_view_rate,
  metrics.video_quartile_p25_rate,
  metrics.video_quartile_p50_rate,
  metrics.video_quartile_p75_rate,
  metrics.video_quartile_p100_rate,
  metrics.cost_micros
FROM campaign
WHERE
  campaign.advertising_channel_type = 'VIDEO'
  AND campaign.status = 'ENABLED'
  AND segments.date DURING LAST_30_DAYS
"""

[display_campaigns_performance]
description = """
Get display campaign performance last 30 days - need impressions, clicks, viewable impressions, and conversions.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.currency_code,
  campaign.id,
  campaign.name,
  campaign.status,
  metrics.impressions,
  metrics.clicks,
  metrics.active_view_impressions,
  metrics.active_view_viewability,
  metrics.conversions,
  metrics.cost_micros
FROM campaign
WHERE
  campaign.advertising_channel_type = 'DISPLAY'
  AND campaign.status = 'ENABLED'
  AND segments.date DURING LAST_30_DAYS
"""


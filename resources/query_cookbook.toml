[conversion_actions_with_attribution]
description = """
List all active conversion actions with their type, category, attribution model, and whether they are included in the conversions metric.
"""
query = """
SELECT
  conversion_action.id,
  conversion_action.name,
  conversion_action.status,
  conversion_action.type,
  conversion_action.category,
  conversion_action.owner_customer,
  conversion_action.include_in_conversions_metric,
  conversion_action.attribution_model_settings.attribution_model
FROM conversion_action
WHERE conversion_action.status != 'REMOVED'
ORDER BY conversion_action.name
"""

[conversion_tracking_customer_settings]
description = """
Check customer conversion tracking configuration including data terms acceptance and enhanced conversions for leads.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.conversion_tracking_setting.accepted_customer_data_terms,
  customer.conversion_tracking_setting.enhanced_conversions_for_leads_enabled,
  customer.conversion_tracking_setting.conversion_tracking_id,
  customer.conversion_tracking_setting.google_ads_conversion_customer
FROM customer
"""

[offline_conversion_upload_health]
description = """
Summary of offline conversion uploads by conversion action, showing success rates and daily summaries for troubleshooting.
"""
query = """
SELECT
  offline_conversion_upload_conversion_action_summary.conversion_action_name,
  offline_conversion_upload_conversion_action_summary.successful_event_count,
  offline_conversion_upload_conversion_action_summary.total_event_count,
  offline_conversion_upload_conversion_action_summary.daily_summaries
FROM offline_conversion_upload_conversion_action_summary
"""

[pmax_campaigns_with_status_diagnostics]
description = """
List Performance Max campaigns with enhanced status diagnostics including primary status and status reasons for troubleshooting.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  campaign.name,
  campaign.status,
  campaign.primary_status,
  campaign.primary_status_reasons,
  campaign.advertising_channel_type
FROM campaign
WHERE
  campaign.advertising_channel_type = 'PERFORMANCE_MAX'
  AND campaign.status != 'REMOVED'
ORDER BY campaign.name
"""

[ads_with_policy_violations]
description = """
Find ads with policy violations including disapproved ads. Returns policy topic entries for review.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  campaign.name,
  ad_group.id,
  ad_group.name,
  ad_group_ad.ad.id,
  ad_group_ad.ad.type,
  ad_group_ad.policy_summary.approval_status,
  ad_group_ad.policy_summary.review_status,
  ad_group_ad.policy_summary.policy_topic_entries
FROM ad_group_ad
WHERE ad_group_ad.policy_summary.approval_status != 'APPROVED'
ORDER BY campaign.name, ad_group.name
LIMIT 500
"""

[change_status_audit_trail]
description = """
Track recent changes to Google Ads resources over the last 7 days using change_status resource. Shows resource type and status changes.
"""
query = """
SELECT
  change_status.resource_name,
  change_status.last_change_date_time,
  change_status.resource_type,
  change_status.resource_status,
  change_status.campaign,
  change_status.ad_group
FROM change_status
WHERE change_status.last_change_date_time DURING LAST_7_DAYS
ORDER BY change_status.last_change_date_time DESC
LIMIT 1000
"""

[campaigns_with_location_criteria]
description = """
List campaigns with their geographic location targeting criteria, including both positive and negative locations.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  campaign.name,
  campaign.status,
  campaign_criterion.criterion_id,
  campaign_criterion.location.geo_target_constant,
  campaign_criterion.negative
FROM campaign_criterion
WHERE
  campaign_criterion.type = 'LOCATION'
  AND campaign.status != 'REMOVED'
ORDER BY campaign.name
"""

[campaigns_with_shared_sets]
description = """
List campaigns and their associated shared sets (negative keyword lists, placement exclusion lists, etc).
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  campaign.name,
  shared_set.id,
  shared_set.name,
  shared_set.type,
  shared_set.status,
  shared_set.member_count
FROM campaign_shared_set
WHERE shared_set.status != 'REMOVED'
ORDER BY campaign.id
"""

[campaign_simulations_bid_analysis]
description = """
Retrieve campaign simulations to analyze potential performance at different bid levels or target settings.
"""
query = """
SELECT
  campaign.id,
  campaign.name,
  campaign_simulation.campaign_id,
  campaign_simulation.type,
  campaign_simulation.modification_method,
  campaign_simulation.start_date,
  campaign_simulation.end_date
FROM campaign_simulation
WHERE
  campaign_simulation.type IN ('CPC_BID', 'TARGET_CPA', 'TARGET_ROAS')
ORDER BY campaign.name
LIMIT 100
"""

[expanded_landing_pages_performance]
description = """
Show expanded landing page URLs with performance metrics last 30 days for landing page analysis.
"""
query = """
SELECT

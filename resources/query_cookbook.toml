[accounts_with_asset_sitelink_last_week]
description = """
Get me the volume and spend metrics (impressions, clicks, cost) of top Sitelink Extensions for each campaign by clicks (>20K) last week - need acct and campaign info with currency. include sitelink text.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  campaign.advertising_channel_type,
  campaign.name,
  asset.id,
  asset.name,
  asset.type,
  asset.sitelink_asset.link_text,
  metrics.impressions,
  metrics.clicks,
  metrics.cost_micros,
  customer.currency_code
FROM campaign_asset
WHERE
  segments.date DURING LAST_WEEK_MON_SUN
  AND campaign_asset.field_type = 'SITELINK'
  AND metrics.clicks > 20000
ORDER BY
  metrics.impressions DESC
LIMIT 10
"""


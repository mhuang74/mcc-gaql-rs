[perf_max_campaigns_with_traffic_last_30_days]
description = """
Give me daily PMax performance last 30 days - need CTR, CPC, conv, rev, ROAS, CPA, campaign IDs + names, and currency
"""
query = """
	SELECT
	  campaign.id,
	  campaign.name,
  	campaign.advertising_channel_type,
	  segments.date,
	  metrics.impressions,
	  metrics.clicks,
	  metrics.ctr,
	  metrics.cost_micros,
	  metrics.average_cost,
	  metrics.conversions,
	  metrics.conversions_value,
	  metrics.conversions_value_per_cost,
	  metrics.cost_per_conversion,
	  customer.currency_code 
	FROM campaign 
	WHERE 
	  segments.date DURING LAST_30_DAYS 
	  AND campaign.advertising_channel_type IN ('PERFORMANCE_MAX')
	  AND metrics.impressions > 1 
	ORDER BY 
	  campaign.id, segments.date
"""

[asset_fields_with_traffic_ytd]
description = """
Show me YTD asset volume and spend metrics (impressions, clicks, cost) by day. include asset type, spend and currency
"""
query = """
	SELECT 
	  asset_field_type_view.field_type, 
	  segments.date,
	  metrics.impressions, 
	  metrics.clicks, 
	  metrics.cost_micros,
	  customer.currency_code  
	FROM asset_field_type_view 
	WHERE 
	  segments.year IN (2026)
	  AND metrics.impressions > 1
	ORDER BY 
	  asset_field_type_view.field_type, segments.date
"""


[campaigns_with_smart_bidding_by_spend]
description = """
Pull top 25 Smart Bidding campaigns by spend (>$1K) last week - need acct and campaign IDs + names, budget, bid strategy, CPC, conv metrics, and ROAS with currency
"""
query = """
	SELECT
	  customer.id,
	  customer.descriptive_name,
	  customer.currency_code,
	  campaign.id,
	  campaign.name,
	  campaign.advertising_channel_type,
	  campaign.bidding_strategy_type,
	  campaign_budget.amount_micros,
	  metrics.average_cpc,
	  metrics.clicks,
	  metrics.cost_micros,
	  metrics.conversions,
	  metrics.cost_per_conversion,
	  metrics.conversions_value,
	  metrics.conversions_value_per_cost
	FROM campaign
	WHERE
	  campaign.bidding_strategy_type IN ('MAXIMIZE_CONVERSIONS', 'MAXIMIZE_CONVERSION_VALUE', 'TARGET_CPA', 'TARGET_ROAS') 
	  AND campaign.status IN ('ENABLED') 
	  AND segments.date DURING LAST_WEEK_MON_SUN 
	  AND metrics.cost_micros > 1000000000
	ORDER by metrics.cost_micros DESC
	LIMIT 25
"""


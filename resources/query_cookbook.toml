[shopping_products_with_roas_performance]
description = """
Pull shopping product performance last 30 days - need product brand, type hierarchy, item ID, title, conversion metrics, and ROAS to identify high-performing products and categories
"""
query = """
SELECT
  campaign.id,
  campaign.name,
  campaign.advertising_channel_type,
  campaign.status,
  ad_group.id,
  ad_group.name,
  ad_group.status,
  segments.product_item_id,
  segments.product_title,
  segments.product_type_l1,
  segments.product_type_l2,
  segments.product_type_l3,
  segments.product_type_l4,
  segments.product_type_l5,
  segments.product_brand,
  metrics.impressions,
  metrics.clicks,
  metrics.conversions,
  metrics.conversions_value,
  metrics.conversions_value_per_cost,
  metrics.cost_micros,
  metrics.ctr,
  metrics.cost_per_conversion
FROM shopping_performance_view
WHERE
  campaign.advertising_channel_type = 'SHOPPING'
  AND campaign.status = 'ENABLED'
  AND ad_group.status = 'ENABLED'
  AND segments.date DURING LAST_30_DAYS
  AND metrics.impressions > 0
ORDER BY
  metrics.conversions_value DESC
"""

[ad_schedule_with_bid_modifier_performance]
description = """
Show me ad schedule performance by day and hour last 14 days - need bid modifiers, conversion metrics, and ROAS to find the best-performing time slots and tune schedule-based bid adjustments
"""
query = """
SELECT
  campaign.id,
  campaign.name,
  campaign_criterion.ad_schedule.day_of_week,
  campaign_criterion.ad_schedule.start_hour,
  campaign_criterion.ad_schedule.end_hour,
  campaign_criterion.bid_modifier,
  segments.date,
  metrics.impressions,
  metrics.clicks,
  metrics.conversions,
  metrics.conversions_value,
  metrics.conversions_value_per_cost,
  metrics.cost_micros,
  metrics.ctr,
  metrics.value_per_conversion
FROM ad_schedule_view
WHERE
  campaign.status = 'ENABLED'
  AND segments.date DURING LAST_14_DAYS
ORDER BY
  campaign_criterion.ad_schedule.day_of_week,
  campaign_criterion.ad_schedule.start_hour
"""

[campaigns_with_budget_utilization_last_30_days]
description = """
Get me campaign budget utilization last 30 days - need daily budget amount, delivery method, recommended budget, actual spend, and ROAS to identify campaigns consistently maxing out their budget
"""
query = """
SELECT
  campaign.id,
  campaign.name,
  campaign.status,
  campaign_budget.amount_micros,
  campaign_budget.total_amount_micros,
  campaign_budget.delivery_method,
  campaign_budget.reference_count,
  campaign_budget.has_recommended_budget,
  campaign_budget.recommended_budget_amount_micros,
  segments.date,
  metrics.cost_micros,
  metrics.impressions,
  metrics.clicks,
  metrics.conversions,
  metrics.conversions_value,
  metrics.conversions_value_per_cost
FROM campaign
WHERE
  campaign.status IN ('ENABLED', 'PAUSED')
  AND segments.date DURING LAST_30_DAYS
ORDER BY
  segments.date DESC,
  metrics.cost_micros DESC
"""


[geo_target_constant_by_resource_name]
description = """
Look up a geo target constants by resource name for Mountain View ('geoTargetConstants/1014044') - get canonical name, country code, ID, status, and target type. useful for resolving location IDs from reporting queries
"""
query = """
SELECT geo_target_constant.canonical_name,
  geo_target_constant.country_code,
  geo_target_constant.id,
  geo_target_constant.name,
  geo_target_constant.status,
  geo_target_constant.target_type
FROM geo_target_constant
WHERE geo_target_constant.resource_name = 'geoTargetConstants/1014044'
"""

[geo_target_constant_by_display_name]
description = """
Look up geo target constants for 'Mountain View' - filter by country code, target type, and name to resolve human-readable location names to IDs
"""
query = """
SELECT geo_target_constant.canonical_name,
  geo_target_constant.country_code,
  geo_target_constant.id,
  geo_target_constant.name,
  geo_target_constant.status,
  geo_target_constant.target_type
FROM geo_target_constant
WHERE geo_target_constant.country_code = 'US'
  AND geo_target_constant.target_type = 'City'
  AND geo_target_constant.name = 'Mountain View'
  AND geo_target_constant.status = 'ENABLED'
"""


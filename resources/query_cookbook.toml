[locations_with_highest_revenue_per_conversion]
description = """
Top 1000 location targets by revenue per conversion in the last 7 days, with at least 10 conversions. Includes geo target constant ID and location performance metrics.
"""
query = """
	SELECT 
		customer.id, 
		customer.descriptive_name, 
		campaign.id, 
		campaign.name, 
		campaign.advertising_channel_type, 
		campaign_criterion.criterion_id, 
		campaign_criterion.type, 
		campaign_criterion.location.geo_target_constant, 
		campaign_criterion.keyword.text, 
		metrics.impressions, 
		metrics.clicks, 
		metrics.cost_micros, 
		customer.currency_code, 
		metrics.conversions, 
		metrics.cost_per_conversion, 
		metrics.conversions_value, 
		metrics.value_per_conversion, 
		metrics.average_cpc 
	FROM location_view
	WHERE 
	  segments.date DURING LAST_7_DAYS
	  and metrics.conversions > 10
	ORDER BY
	  metrics.value_per_conversion desc, metrics.conversions desc
	LIMIT 1000
"""

[asset_performance_rsa]
description = """
Responsive Search Ad (RSA) performance in the last 30 days, including headline and description copy, path text, and engagement metrics. Limited to 1000 results sorted by CTR.
"""
query = """
SELECT 
  customer.id, 
  customer.descriptive_name, 
  campaign.id, 
  campaign.name, 
  campaign.advertising_channel_type, 
  ad_group.id, 
  ad_group.name, 
  ad_group.type,
  ad_group_ad.ad.id,
  ad_group_ad.ad.responsive_search_ad.headlines, 
  ad_group_ad.ad.responsive_search_ad.descriptions, 
  ad_group_ad.ad.responsive_search_ad.path1, 
  ad_group_ad.ad.responsive_search_ad.path2, 
  metrics.impressions, 
  metrics.clicks, 
  metrics.ctr, 
  metrics.cost_micros, 
  metrics.average_cpc 
FROM ad_group_ad 
WHERE 
  ad_group_ad.ad.type IN ('RESPONSIVE_SEARCH_AD') 
  AND segments.date DURING LAST_30_DAYS 
ORDER BY 
  campaign.name, 
  ad_group.name, 
  metrics.ctr DESC 
LIMIT 1000 
"""

[recent_campaign_changes]
description = """
Last 100 campaign modifications from the last 14 days, including timestamp, user email, client type, and which fields were changed. Useful for audit trails and change tracking.
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  change_event.change_date_time,
  change_event.client_type,
  change_event.change_resource_type,
  change_event.changed_fields,
  change_event.user_email,
  campaign.name
FROM
  change_event
WHERE
  change_event.change_date_time DURING LAST_14_DAYS
  AND change_event.change_resource_type IN ('CAMPAIGN')
ORDER BY
  change_event.change_date_time DESC
LIMIT 100
"""

[recent_changes]
description = """
recent changes across common objects like campaign, adgroup, ad, keywords, budgets, etc. return with changed object type, fields, user, changed fields, and datetime of change event
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  change_event.change_date_time,
  change_event.client_type,
  change_event.change_resource_type,
  change_event.changed_fields,
  change_event.user_email,
  campaign.name
FROM
  change_event
WHERE
  change_event.change_date_time DURING LAST_14_DAYS
  AND change_event.change_resource_type IN ('CAMPAIGN', 'AD_GROUP', 'AD_GROUP_AD', 'AD', 'AD_GROUP_CRITERION', 'CAMPAIGN_BUDGET')
ORDER BY
  change_event.change_date_time DESC
LIMIT 100
"""


[conversion_actions_configuration]
description = """
Get me conversion actions setup - need action name, type, category, status, counting type, and primary inclusion flag
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  conversion_action.id,
  conversion_action.name,
  conversion_action.type,
  conversion_action.category,
  conversion_action.status,
  conversion_action.counting_type,
  conversion_action.include_in_conversions_metric,
  conversion_action.value_settings.default_value
FROM conversion_action
WHERE conversion_action.status = 'ENABLED'
"""

[conversion_actions_performance]
description = """
Pull conversion actions performance last 30 days - need all conversions and conversion value (metrics.conversions is not supported for conversion_action resource)
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.currency_code,
  conversion_action.name,
  conversion_action.type,
  conversion_action.category,
  metrics.all_conversions,
  metrics.all_conversions_value
FROM conversion_action
WHERE segments.date DURING LAST_30_DAYS
  AND conversion_action.status = 'ENABLED'
ORDER BY metrics.all_conversions DESC
"""

[ad_groups_with_performance]
description = """
Get me ad group structure with performance last 30 days - need campaign, ad group IDs and names, status, type, and metrics
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.currency_code,
  campaign.name,
  campaign.advertising_channel_type,
  ad_group.name,
  ad_group.status,
  ad_group.type,
  metrics.impressions,
  metrics.clicks,
  metrics.cost_micros,
  metrics.conversions,
  metrics.cost_per_conversion
FROM ad_group
WHERE campaign.status = 'ENABLED'
  AND ad_group.status = 'ENABLED'
  AND segments.date DURING LAST_30_DAYS
ORDER BY campaign.name, ad_group.name
"""

[keywords_with_performance]
description = """
Show me targeted keywords with performance last 30 days - need keyword text, match type, status, and full metrics
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.currency_code,
  campaign.name,
  ad_group.name,
  ad_group_criterion.keyword.text,
  ad_group_criterion.keyword.match_type,
  ad_group_criterion.status,
  metrics.impressions,
  metrics.clicks,
  metrics.cost_micros,
  metrics.conversions,
  metrics.cost_per_conversion
FROM keyword_view
WHERE campaign.status = 'ENABLED'
  AND ad_group.status = 'ENABLED'
  AND segments.date DURING LAST_30_DAYS
ORDER BY metrics.cost_micros DESC
LIMIT 200
"""

[rsa_assets_detail]
description = """
Get me Responsive Search Ad assets last 30 days - need headlines, descriptions, final URLs, approval status, and performance metrics
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.currency_code,
  campaign.name,
  ad_group.name,
  ad_group_ad.ad.responsive_search_ad.headlines,
  ad_group_ad.ad.responsive_search_ad.descriptions,
  ad_group_ad.ad.final_urls,
  ad_group_ad.policy_summary.approval_status,
  metrics.impressions,
  metrics.clicks,
  metrics.conversions,
  metrics.cost_micros
FROM ad_group_ad
WHERE ad_group_ad.ad.type = 'RESPONSIVE_SEARCH_AD'
  AND campaign.status = 'ENABLED'
  AND ad_group.status = 'ENABLED'
  AND segments.date DURING LAST_30_DAYS
"""

[rsa_asset_level_performance]
description = """

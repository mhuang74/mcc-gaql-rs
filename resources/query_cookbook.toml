[account_ids_with_access_and_traffic_last_week]
description = """
Get me account IDs with clicks in the last week
"""
query = """
SELECT 
	customer.id
FROM customer 
WHERE 
	segments.date during LAST_WEEK_MON_SUN
	AND metrics.clicks > 0
"""

[accounts_with_traffic_last_week]
description = """
Show me account-level performance last week - need impressions, clicks, spend, and currency
"""
query = """
SELECT 
	customer.id, 
	customer.descriptive_name, 
	metrics.impressions, 
	metrics.clicks, 
	metrics.cost_micros,
	customer.currency_code 
FROM customer 
WHERE 
	segments.date during LAST_WEEK_MON_SUN
	AND metrics.impressions > 0
"""

[keywords_with_top_traffic_last_week]
description = """
Pull my top 10 keywords by clicks (>10K) last week - need acct, campaign, ad group IDs + names, channel type, and currency
"""
query = """
SELECT
	customer.id,
	customer.descriptive_name,
	campaign.id,
	campaign.name,
	campaign.advertising_channel_type,
	ad_group.id,
	ad_group.name,
	ad_group.type,
	ad_group_criterion.criterion_id,
	ad_group_criterion.keyword.text,
	metrics.impressions,
	metrics.clicks,
	metrics.cost_micros,
	customer.currency_code 
FROM keyword_view
WHERE
	segments.date DURING LAST_WEEK_MON_SUN
	and metrics.clicks > 10000
ORDER BY
	metrics.clicks DESC
LIMIT 10
"""

[accounts_with_perf_max_campaigns_last_week]
description = """
Get me the engagement metrics of top PMax campaigns by clicks (>100) last week - need acct and campaign IDs + names, channel type, and currency
"""
query = """
SELECT 
  customer.id, 
  customer.descriptive_name, 
  campaign.id, 
  campaign.advertising_channel_type, 
  campaign.name, 
  metrics.impressions, 
  metrics.clicks, 
  metrics.cost_micros,
  customer.currency_code 
FROM campaign 
WHERE 
  segments.date DURING LAST_WEEK_MON_SUN 
  AND campaign.advertising_channel_type IN ('PERFORMANCE_MAX') 
  AND metrics.clicks > 100
ORDER BY 
  metrics.clicks DESC 
LIMIT 10
"""


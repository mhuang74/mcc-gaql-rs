[locations_with_highest_revenue_per_conversion]
description = """
Pull performance data for top 20 locations for each campaign by rev per conv (>10 conv) last 7 days - need account and campaign info, geo target IDs, and conversion metrics with currency
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  customer.currency_code,
  campaign.id,
  campaign.name,
  campaign.advertising_channel_type,
  campaign_criterion.criterion_id,
  campaign_criterion.type,
  campaign_criterion.location.geo_target_constant,
  metrics.impressions,
  metrics.clicks,
  metrics.cost_micros,
  metrics.average_cpc,
  metrics.conversions,
  metrics.cost_per_conversion,
  metrics.conversions_value,
  metrics.value_per_conversion
FROM location_view
WHERE
  segments.date DURING LAST_7_DAYS
  AND metrics.conversions > 10
ORDER BY
  metrics.value_per_conversion DESC, metrics.conversions DESC
LIMIT 20
"""

[asset_performance_rsa]
description = """
Get me RSA performance last 30 days. include account, campaign, adgroup info. need headline and description copy, path text, CTR, and volume/spend metrics (impressions, clicks, cost). Ordered by campaign/group name and CTR.
"""
query = """
SELECT 
  customer.id, 
  customer.descriptive_name, 
  campaign.id, 
  campaign.name, 
  campaign.advertising_channel_type, 
  ad_group.id, 
  ad_group.name, 
  ad_group.type,
  ad_group_ad.ad.id,
  ad_group_ad.ad.responsive_search_ad.headlines, 
  ad_group_ad.ad.responsive_search_ad.descriptions, 
  ad_group_ad.ad.responsive_search_ad.path1, 
  ad_group_ad.ad.responsive_search_ad.path2, 
  metrics.impressions, 
  metrics.clicks, 
  metrics.ctr, 
  metrics.cost_micros, 
  metrics.average_cpc 
FROM ad_group_ad 
WHERE 
  ad_group_ad.ad.type IN ('RESPONSIVE_SEARCH_AD') 
  AND segments.date DURING LAST_30_DAYS 
ORDER BY 
  campaign.name, 
  ad_group.name, 
  metrics.ctr DESC 
LIMIT 1000 
"""

[recent_campaign_changes]
description = """
Show me last 100 campaign changes in the last 14 days - need account and campaign info, timestamp, user, client type, and what changed
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  change_event.change_date_time,
  change_event.client_type,
  change_event.change_resource_type,
  change_event.changed_fields,
  change_event.user_email,
  campaign.name
FROM
  change_event
WHERE
  change_event.change_date_time DURING LAST_14_DAYS
  AND change_event.change_resource_type IN ('CAMPAIGN')
ORDER BY
  change_event.change_date_time DESC
LIMIT 100
"""

[recent_changes]
description = """
Pull recent changes across campaigns, ad groups, ads, keywords, and budgets last 14 days - need account and campaign info, client type, user, changed fields, and timestamp
"""
query = """
SELECT
  customer.id,
  customer.descriptive_name,
  campaign.id,
  change_event.change_date_time,
  change_event.client_type,
  change_event.change_resource_type,
  change_event.changed_fields,
  change_event.user_email,
  campaign.name
FROM
  change_event
WHERE
  change_event.change_date_time DURING LAST_14_DAYS
  AND change_event.change_resource_type IN ('CAMPAIGN', 'AD_GROUP', 'AD_GROUP_AD', 'AD', 'AD_GROUP_CRITERION', 'CAMPAIGN_BUDGET')
ORDER BY
  change_event.change_date_time DESC
LIMIT 100
"""

